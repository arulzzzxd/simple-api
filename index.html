<!DOCTYPE html>
<html lang="en" class="dark h-full overflow-hidden select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Chat - Cyan Cyberpunk v2.1</title>
    <link class="js-favicon" rel="icon" type="image/x-icon" href="https://i.pinimg.com/736x/0d/71/2a/0d712a0b6805c0b44386339048bdfce5.jpg?format=png&name=900x900">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'heading': ['"Poppins"', 'sans-serif'],
                        'body': ['"Inter"', 'sans-serif'],
                    },
                    colors: {
                        'cyan-ai-dark': '#060a13',
                        'cyan-ai-primary': '#06b6d4',
                        'cyan-ai-secondary': '#0891b2',
                        'cyan-ai-bubble-user': '#0e7490',
                        'cyan-ai-bubble-bot': '#0f172a',
                        'cyan-ai-text': '#e2f8fc',
                    },
                    animation: {
                        'slide-up': 'slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
                        'pulse-cyan': 'pulse-cyan 2s infinite',
                        'glow-pulse': 'glow-pulse 3s infinite alternate',
                    },
                    keyframes: {
                        'slide-up': { '0%': { opacity: '0', transform: 'translateY(15px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        'pulse-cyan': {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(6, 182, 212, 0.4)', borderColor: 'rgba(6, 182, 212, 0.4)' },
                            '70%': { boxShadow: '0 0 0 10px rgba(6, 182, 212, 0)', borderColor: 'rgba(6, 182, 212, 0.1)' }
                        },
                        'glow-pulse': {
                            '0%': { filter: 'drop-shadow(0 0 2px rgba(6, 182, 212, 0.3))' },
                            '100%': { filter: 'drop-shadow(0 0 12px rgba(6, 182, 212, 0.7))' }
                        }
                    },
                    boxShadow: {
                        'cyan-glow': '0 0 25px -5px rgba(6, 182, 212, 0.3)',
                        'cyan-neon': '0 0 15px rgba(6, 182, 212, 0.4)',
                        'cyan-neon-inset': 'inset 0 0 15px rgba(6, 182, 212, 0.15)',
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap');
        
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: -0.010em;
            touch-action: manipulation; 
        }
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        ::-webkit-scrollbar {
            width: 5px;
        }
        
        ::-webkit-scrollbar-track {
            background: #060a13;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #06b6d4;
            border-radius: 99px;
        }
        
        .chat-bubble {
            border-radius: 16px;
            padding: 0.95rem 1.2rem;
            position: relative;
            max-width: 85%;
            word-break: break-word;
        }

        .user-bubble {
            background: linear-gradient(135deg, #0e7490, #0891b2);
            color: white;
            border-bottom-right-radius: 3px;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.25);
        }
        
        .bot-bubble {
            background-color: #0f172a;
            color: #e2f8fc;
            border: 1px solid #1e293b;
            border-bottom-left-radius: 3px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        /* Animasi Mengetik Tiga Titik */
        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: #06b6d4;
            border-radius: 50%;
            display: inline-block;
            animation: cyberBounce 1.4s infinite ease-in-out both;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes cyberBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1.0); opacity: 1; }
        }
        
        .message-enter {
            animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .code-block {
            background-color: #030712;
            color: #a5f3fc;
            border-radius: 8px;
            padding: 14px;
            margin: 10px 0;
            font-family: 'ui-monospace', monospace;
            font-size: 13px;
            border: 1px solid #1e293b;
        }
        
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #1e293b;
        }
        
        .highlighted-text {
            background-color: rgba(6, 182, 212, 0.15);
            color: #22d3ee;
            padding: 1px 5px;
            border-radius: 4px;
            border: 1px solid rgba(6, 182, 212, 0.3);
            font-family: monospace;
        }

        .typing-cursor::after {
            content: '▊';
            animation: blink 0.8s step-start infinite;
            color: #06b6d4;
            margin-left: 2px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="bg-cyan-ai-dark text-cyan-ai-text h-full overflow-hidden flex flex-col justify-between">
    
    <main class="w-full h-full max-w-4xl mx-auto px-4 py-4 md:py-6 flex flex-col justify-between overflow-hidden">
        
        <!-- Header Cyberpunk -->
        <div class="border border-cyan-500/30 p-4 rounded-xl bg-cyan-ai-bubble-bot/70 shadow-cyan-glow mb-4 flex-shrink-0 backdrop-blur-md">
            <div class="text-center">
                <h1 class="text-2xl md:text-3xl font-bold font-heading flex items-center justify-center gap-3 text-cyan-ai-primary">
                    <span class="p-1.5 border border-cyan-ai-primary rounded-full animate-pulse-cyan animate-glow-pulse">✨</span>
                    AI Chat Assistant
                </h1>
                <p class="text-xs mt-1 opacity-70">Powered by <span class="text-cyan-ai-primary font-bold">Shikakuzu</span></p>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat" class="flex-1 border border-cyan-500/20 p-4 rounded-xl overflow-y-auto mb-4 bg-cyan-ai-dark/60 shadow-cyan-neon-inset">
            <div class="text-center mb-6 message-enter">
                <div class="bot-bubble p-5 inline-block max-w-md shadow-lg border border-cyan-500/25">
                    <div class="text-xl mb-2 font-bold font-heading text-cyan-ai-primary">Hai 👋</div>
                    <p class="mb-2 text-cyan-300 text-sm">Selamat datang! Mari mulai percakapan dengan AI.</p>
                    <p class="text-[11px] opacity-65">Support: Gambar, Video, Audio, dan PDF</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="border border-cyan-500/30 p-4 rounded-xl bg-cyan-ai-bubble-bot/90 shadow-cyan-glow flex-shrink-0 backdrop-blur-md">
            <div id="file-preview" class="hidden mb-3">
                <div class="border border-cyan-500 bg-cyan-ai-dark p-3 flex items-center justify-between rounded-xl">
                    <div id="preview-content" class="flex items-center space-x-3"></div>
                    <button type="button" id="remove-file" class="text-red-400 hover:text-red-500 p-2 rounded-full hover:bg-red-950/40">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <form id="form" class="space-y-3">
                <div class="flex items-center space-x-3">
                    <div class="flex-1 min-w-0">
                        <textarea name="text" placeholder="Ketik pesan di sini..." rows="1" 
                                class="w-full resize-none p-3.5 border border-cyan-500/30 bg-cyan-ai-dark text-cyan-ai-text rounded-xl focus:outline-none focus:border-cyan-ai-primary focus:shadow-cyan-neon placeholder-cyan-900/80 text-sm"
                                oninput="autoResize(this)"></textarea>
                    </div>
                    
                    <input type="file" name="file" accept="image/*,video/mp4,audio/*,application/pdf" class="hidden" id="file-upload">
                    
                    <!-- Tombol Upload File -->
                    <label for="file-upload" class="border border-cyan-500/40 bg-cyan-ai-dark text-cyan-400 hover:text-cyan-200 hover:border-cyan-400 p-3.5 cursor-pointer rounded-xl flex-shrink-0 flex items-center justify-center w-12 h-12 transition-all duration-200" title="Unggah File">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                        </svg>
                    </label>
                    
                    <!-- Tombol Kirim -->
                    <button type="submit" class="bg-cyan-700 hover:bg-cyan-500 text-white hover:shadow-cyan-neon p-3.5 rounded-xl flex-shrink-0 flex items-center justify-center w-12 h-12 transition-all duration-200" title="Kirim Pesan">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 block text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const chat = document.getElementById("chat");
        const form = document.getElementById("form");
        const textarea = form.querySelector("textarea");
        const fileInput = document.getElementById("file-upload");
        const filePreview = document.getElementById("file-preview");
        const previewContent = document.getElementById("preview-content");
        const removeFileBtn = document.getElementById("remove-file");
        
        let selectedFile = null;
        let isTyping = false;

        document.addEventListener('gesturestart', (e) => e.preventDefault());

        function autoResize(el) {
            el.style.height = 'auto';
            const maxHeight = 100;
            const newHeight = Math.min(el.scrollHeight, maxHeight);
            el.style.height = newHeight + 'px';
            el.style.overflowY = newHeight === maxHeight ? 'auto' : 'hidden';
        }

        function getFileIcon(fileType) {
            const icons = {
                'image': `<svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>`,
                'video': `<svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>`,
                'audio': `<svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" /></svg>`,
                'pdf': `<svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>`
            };
            const type = fileType === 'application/pdf' ? 'pdf' : fileType.split('/')[0];
            return icons[type] || icons.audio;
        }

        // Tampilan Loading AI Mengetik dengan Animasi Memantul Murni
        function showTypingIndicator() {
            if (isTyping) return;
            isTyping = true;
            
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'flex justify-start mb-4 message-enter';
            typingDiv.innerHTML = `
                <div class="bot-bubble p-4 max-w-xs shadow-md border border-cyan-500/20 bg-cyan-ai-bubble-bot">
                    <div class="flex items-center space-x-2">
                        <span class="text-xs text-cyan-400 font-mono mr-1">AI sedang mengetik</span>
                        <div class="flex space-x-1 items-center h-3">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                </div>`;
            
            chat.appendChild(typingDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
            isTyping = false;
        }

        function showFilePreview(file) {
            selectedFile = file;
            const fileType = file.type;
            previewContent.innerHTML = '';
            
            if (fileType.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.className = 'h-14 w-14 object-cover border border-cyan-500 rounded-lg';
                img.onload = () => URL.revokeObjectURL(img.src);
                
                const fileInfo = document.createElement('div');
                fileInfo.innerHTML = `<div class="text-xs font-semibold text-cyan-100">${file.name}</div><div class="text-[10px] text-cyan-ai-primary font-bold bg-cyan-950 px-1.5 py-0.5 rounded mt-1 inline-block">${(file.size / 1024).toFixed(1)} KB</div>`;
                
                previewContent.appendChild(img);
                previewContent.appendChild(fileInfo);
            } else if (fileType === 'video/mp4') {
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                video.className = 'h-14 w-20 object-cover border border-cyan-500 rounded-lg';
                video.muted = true;
                video.onloadeddata = () => URL.revokeObjectURL(video.src);
                
                const fileInfo = document.createElement('div');
                fileInfo.innerHTML = `<div class="text-xs font-semibold text-cyan-100">${file.name}</div><div class="text-[10px] text-cyan-ai-primary font-bold bg-cyan-950 px-1.5 py-0.5 rounded mt-1 inline-block">${(file.size / 1024 / 1024).toFixed(1)} MB</div>`;
                
                previewContent.appendChild(video);
                previewContent.appendChild(fileInfo);
            } else {
                const fileContainer = document.createElement('div');
                fileContainer.className = 'flex items-center space-x-3';
                
                const iconDiv = document.createElement('div');
                iconDiv.className = 'flex-shrink-0 p-2 bg-cyan-950/70 rounded-lg';
                iconDiv.innerHTML = getFileIcon(fileType);
                
                const fileTypeName = fileType === 'application/pdf' ? 'File PDF' : 'File Audio';
                const fileTypeColor = fileType === 'application/pdf' ? 'text-red-300' : 'text-green-300';

                const fileInfo = document.createElement('div');
                fileInfo.innerHTML = `<div class="text-xs font-semibold text-cyan-100">${file.name}</div><div class="text-[10px] text-cyan-ai-primary font-bold bg-cyan-950 px-1.5 py-0.5 rounded mt-1 inline-block">${(file.size / 1024 / 1024).toFixed(1)} MB</div><div class="text-[10px] ${fileTypeColor} mt-0.5">${fileTypeName}</div>`;
                
                fileContainer.appendChild(iconDiv);
                fileContainer.appendChild(fileInfo);
                previewContent.appendChild(fileContainer);
            }
            
            filePreview.classList.remove('hidden');
        }

        function removeFilePreview() {
            selectedFile = null;
            fileInput.value = '';
            filePreview.classList.add('hidden');
            previewContent.innerHTML = '';
        }

        function createMediaElement(file, fileUrl) {
            const fileType = file.type;
            if (fileType.startsWith('image/')) {
                return `<img src="${fileUrl}" alt="Gambar" class="max-w-xs border border-cyan-500 rounded-lg cursor-pointer hover:opacity-90 mb-2" onclick="window.open('${fileUrl}', '_blank')">`;
            } else if (fileType === 'video/mp4') {
                return `<video src="${fileUrl}" controls class="max-w-xs border border-cyan-500 rounded-lg shadow-md mb-2"></video>`;
            } else if (fileType.startsWith('audio/')) {
                return `<div class="border border-cyan-500 rounded-lg p-3 max-w-xs bg-cyan-ai-bubble-bot mb-2"><div class="flex items-center space-x-2.5 mb-2"><div class="text-cyan-400 p-1.5 rounded bg-cyan-950">${getFileIcon(fileType)}</div><div><div class="text-xs font-semibold text-cyan-100">${file.name}</div></div></div><audio src="${fileUrl}" controls class="w-full h-8">Browser tidak mendukung.</audio></div>`;
            } else if (fileType === 'application/pdf') {
                return `<div class="border border-cyan-500 rounded-lg p-3 max-w-sm bg-cyan-ai-bubble-bot shadow-md mb-2"><div class="flex items-center justify-between mb-2"><div class="flex items-center space-x-2"><div class="text-cyan-400 p-1.5 rounded bg-cyan-950">${getFileIcon(fileType)}</div><div class="text-xs font-semibold text-cyan-100">${file.name}</div></div><button onclick="window.open('${fileUrl}', '_blank')" class="bg-cyan-700 text-white px-3 py-1 text-xs rounded">Buka</button></div></div>`;
            }
            return '';
        }

        function processTextFormatting(text) {
            text = text.replace(/\*\*(.*?)\*\*/g, '<span class="font-bold text-white">$1</span>');
            text = text.replace(/\*(.*?)\*/g, '<span class="font-semibold text-cyan-100">$1</span>');
            return text;
        }

        function processHighlightedText(message) {
            return message.replace(/`(.*?)`/g, '<span class="highlighted-text">$1</span>');
        }

        function processCodeBlocks(message) {
            const codeBlockRegex = /```(\w+)?\s*([\s\S]*?)```/g;
            const codeBlocks = [];
            let match, lastIndex = 0, result = '';
            
            while ((match = codeBlockRegex.exec(message)) !== null) {
                result += message.substring(lastIndex, match.index);
                const language = match[1] || 'text';
                const code = match[2].trim();
                const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
                
                codeBlocks.push({ id: codeId, code: code, language: language.toLowerCase() });
                result += `\u0001CODE_BLOCK_${codeBlocks.length - 1}\u0001`;
                lastIndex = codeBlockRegex.lastIndex;
            }
            result += message.substring(lastIndex);
            
            codeBlocks.forEach((block, index) => {
                const placeholder = `\u0001CODE_BLOCK_${index}\u0001`;
                const escapedCode = block.code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const codeHtml = `
                <div class="code-block shadow-inner">
                    <div class="code-header">
                        <span class="code-language">${block.language}</span>
                        <button class="copy-btn" data-original-code="${block.code.replace(/"/g, '&quot;')}">Salin</button>
                    </div>
                    <pre class="overflow-x-auto" id="${block.id}">${escapedCode}</pre>
                </div>`;
                result = result.replace(placeholder, codeHtml);
            });
            return result;
        }

        // Efek Ketik Karakter AI
        function typeWriter(element, htmlContent, delay = 8) {
            return new Promise((resolve) => {
                element.classList.add('typing-cursor');
                let currentText = '';
                let index = 0;
                
                const parts = htmlContent.match(/(<[^>]+>|[^<]+)/g) || [htmlContent];
                
                function type() {
                    if (index < parts.length) {
                        const part = parts[index];
                        if (part.startsWith('<')) {
                            currentText += part;
                            element.innerHTML = currentText;
                            index++;
                            setTimeout(type, delay);
                        } else {
                            let charIndex = 0;
                            function typeChar() {
                                if (charIndex < part.length) {
                                    currentText += part[charIndex];
                                    element.innerHTML = currentText;
                                    charIndex++;
                                    chat.scrollTop = chat.scrollHeight;
                                    setTimeout(typeChar, delay);
                                } else {
                                    index++;
                                    setTimeout(type, delay);
                                }
                            }
                            typeChar();
                        }
                    } else {
                        element.classList.remove('typing-cursor');
                        resolve();
                    }
                }
                type();
            });
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) showFilePreview(file);
        });

        removeFileBtn.addEventListener('click', removeFilePreview);
        textarea.focus();

        form.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const userText = formData.get("text");

            if (userText.trim() === '' && !selectedFile) {
                textarea.focus();
                return;
            }

            let userMessageContent = '';
            let fileUrl = '';
            
            if (selectedFile) {
                fileUrl = URL.createObjectURL(selectedFile);
                userMessageContent += createMediaElement(selectedFile, fileUrl);
                formData.set("file", selectedFile);
            }
            
            if (userText.trim() !== '') {
                userMessageContent += processTextFormatting(userText);
            }

            const userMessageDiv = document.createElement('div');
            userMessageDiv.className = 'flex justify-end mb-4 message-enter';
            userMessageDiv.innerHTML = `<div class="chat-bubble user-bubble">${userMessageContent}</div>`;
            chat.appendChild(userMessageDiv);
            
            const submitBtn = form.querySelector("button[type='submit']");
            submitBtn.disabled = true;
            textarea.disabled = true;
            
            removeFilePreview();
            form.reset();
            textarea.style.height = 'auto';
            
            showTypingIndicator();
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch("/chat", { method: "POST", body: formData });
                const data = await res.json();

                hideTypingIndicator();

                const responseDiv = document.createElement('div');
                responseDiv.className = 'flex justify-start mb-4 message-enter';

                if (data.result) {
                    let processedResponse = processCodeBlocks(data.result);
                    processedResponse = processHighlightedText(processedResponse);
                    processedResponse = processTextFormatting(processedResponse);
                    
                    responseDiv.innerHTML = `
                        <div class="chat-bubble bot-bubble">
                            <div class="flex items-center mb-2 pb-1.5 border-b border-cyan-900/50">
                                <div class="w-2.5 h-2.5 bg-cyan-ai-primary rounded-full mr-2 animate-pulse"></div>
                                <span class="text-xs text-cyan-200 font-semibold font-heading">AI Assistant</span>
                            </div>
                            <div class="text-sm leading-relaxed" id="typing-box"></div>
                        </div>`;
                    
                    chat.appendChild(responseDiv);
                    
                    const typingBox = responseDiv.querySelector("#typing-box");
                    await typeWriter(typingBox, processedResponse, 8);
                } else {
                    responseDiv.innerHTML = `<div class="rounded-xl border border-red-500/30 bg-red-950/20 p-4 max-w-md shadow-lg text-red-100 text-sm">Error: ${data.error}</div>`;
                    chat.appendChild(responseDiv);
                }

            } catch (error) {
                hideTypingIndicator();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'flex justify-start mb-4 message-enter';
                errorDiv.innerHTML = `<div class="rounded-xl border border-red-500/30 bg-red-950/20 p-4 max-w-md text-red-100 text-sm">Koneksi terputus. Silakan coba lagi.</div>`;
                chat.appendChild(errorDiv);
            }

            // Membuka kembali form tapi menghilangkan auto-focus & menutup keyboard
            submitBtn.disabled = false;
            textarea.disabled = false;
            textarea.blur(); 
            chat.scrollTop = chat.scrollHeight;
            
            if (fileUrl) {
                setTimeout(() => URL.revokeObjectURL(fileUrl), 1000);
            }
        };

        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
