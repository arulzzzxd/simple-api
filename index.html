<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Cyan Interface</title>
    <link class="js-favicon" rel="icon" type="image/x-icon" href="https://i.pinimg.com/736x/0d/71/2a/0d712a0b6805c0b44386339048bdfce5.jpg?format=png&name=900x900">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'heading': ['"Poppins"', 'sans-serif'],
                        'body': ['"Inter"', 'sans-serif'],
                    },
                    colors: {
                        'cyan-ai-dark': '#0f172a',
                        'cyan-ai-primary': '#22d3ee',
                        'cyan-ai-secondary': '#155e75',
                        'cyan-ai-bubble-user': '#0e7490',
                        'cyan-ai-bubble-bot': '#1e293b',
                        'cyan-ai-text': '#e0f7fa',
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'slide-up': 'slide-up 0.3s ease-out',
                        'bounce-soft': 'bounce-soft 1s ease-in-out infinite',
                        'pulse-cyan': 'pulse-cyan 2s infinite',
                    },
                    keyframes: {
                        'float': { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-10px)' } },
                        'slide-up': { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        'bounce-soft': { '0%, 100%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.05)' } },
                        'pulse-cyan': {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(34, 211, 238, 0.4)' },
                            '70%': { boxShadow: '0 0 0 10px rgba(34, 211, 238, 0)' }
                        }
                    },
                    boxShadow: {
                        'cyan-glow': '0 0 15px -3px rgba(34, 211, 238, 0.3)',
                        'cyan-raised': '0.4rem 0.4rem 0 #0e7490',
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
        
        * {
            transition: all 0.2s ease-in-out;
            letter-spacing: -0.01em;
        }
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #111;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #22d3ee;
            border-radius: 3px;
        }
        
        .cyan-raised-shadow {
            box-shadow: 0.3rem 0.3rem 0 #0e7490;
            transition: all 0.2s ease;
        }
        
        .cyan-raised-shadow:hover {
            transform: translate(0.1rem, 0.1rem);
            box-shadow: 0.15rem 0.15rem 0 #0e7490;
        }
        
        .hidden {
            display: none;
        }
        
        .chat-bubble {
            border-radius: 12px;
            padding: 1rem 1.25rem;
            position: relative;
            max-width: 80%;
        }

        .user-bubble {
            background-color: #0e7490;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .bot-bubble {
            background-color: #1e293b;
            color: #e0f7fa;
            border: 1px solid #155e75;
            border-bottom-left-radius: 4px;
        }
        
        .typing-dot {
            animation: bounce-soft 1s ease-in-out infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.1s; }
        .typing-dot:nth-child(3) { animation-delay: 0.2s; }
        
        .message-enter {
            animation: slide-up 0.3s ease-out;
        }
        
        .code-block {
            background-color: #0b1120;
            color: #a5f3fc;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
            font-family: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.5;
            overflow-x: auto;
            position: relative;
            border: 1px solid #155e75;
        }
        
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #155e75;
        }
        
        .code-language {
            font-size: 12px;
            color: #22d3ee;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .copy-btn {
            background: #1e293b;
            border: 1px solid #155e75;
            color: #22d3ee;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s ease;
        }
        
        .copy-btn:hover {
            background: #0e7490;
            color: white;
            border-color: #22d3ee;
        }
        
        .copy-btn.copied {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }
        
        .code-content {
            white-space: pre-wrap;
            font-family: inherit;
        }
        
        .highlighted-text {
            background-color: rgba(34, 211, 238, 0.15);
            color: #22d3ee;
            padding: 1px 4px;
            border-radius: 4px;
            border: 1px solid rgba(34, 211, 238, 0.3);
            font-family: monospace;
        }
        
        .file-preview-container {
            border: 1px solid #22d3ee;
            background: #1e293b;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .input-field {
            border: 1px solid #155e75;
            background: #1e293b;
            color: #e0f7fa;
            border-radius: 12px;
        }

        .input-field:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.2);
        }
        
        .btn-primary {
            background-color: #0e7490;
            color: white;
            border-radius: 12px;
            transition: background-color 0.2s ease;
        }
        
        .btn-primary:hover {
            background-color: #155e75;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            border: 1px solid #155e75;
            background: transparent;
            color: #22d3ee;
            border-radius: 12px;
        }
        
        .btn-secondary:hover {
            background: #1e293b;
            border-color: #22d3ee;
        }
    </style>
</head>
<body class="font-body bg-cyan-ai-dark text-cyan-ai-text min-h-screen">
    <main class="container mx-auto px-4 py-8 max-w-4xl">

        <!-- Header -->
        <div class="border border-cyan-500/30 p-6 rounded-2xl cyan-raised-shadow mb-8 bg-cyan-ai-bubble-bot shadow-cyan-glow">
            <div class="text-center">
                <h1 class="text-3xl md:text-4xl font-bold font-heading mb-4 flex items-center justify-center gap-4 text-cyan-ai-primary">
                    <span class="p-2 border-2 border-cyan-ai-primary rounded-full animate-pulse-cyan">✨</span>
                    AI Chat Assistant
                </h1>
                <p class="text-lg mb-2">Powered by <span class="text-cyan-ai-primary font-bold">Shikakuzu</span></p>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat" class="border border-cyan-500/20 p-6 rounded-2xl cyan-raised-shadow min-h-[60vh] max-h-[70vh] overflow-y-auto mb-6 bg-cyan-ai-dark shadow-inner">
            <div class="text-center mb-8 message-enter">
                <div class="bot-bubble p-6 inline-block max-w-md shadow-lg">
                    <div class="text-2xl mb-3 font-bold font-heading text-cyan-ai-primary">Hai 👋</div>
                    <p class="mb-3 text-cyan-500">Selamat datang! Mari mulai percakapan dengan AI.</p>
                    <p class="text-xs opacity-60">Support: Gambar, Video, Audio, dan PDF</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="border border-cyan-500/30 p-6 rounded-2xl cyan-raised-shadow bg-cyan-ai-bubble-bot">
            <div id="file-preview" class="hidden mb-4">
                <div class="file-preview-container p-4 flex items-center justify-between">
                    <div id="preview-content" class="flex items-center space-x-3"></div>
                    <button type="button" id="remove-file" class="text-red-400 hover:text-red-600 p-2 rounded-full hover:bg-red-950/50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <form id="form" class="space-y-4">
                <div class="flex items-end space-x-3">
                    <div class="flex-1">
                        <textarea name="text" placeholder="Ketik pesan di sini..." rows="1" 
                                class="w-full resize-none p-4 input-field focus:outline-none placeholder-cyan-700"
                                oninput="autoResize(this)"></textarea>
                    </div>
                    
                    <input type="file" name="file" accept="image/*,video/mp4,audio/*,application/pdf" class="hidden" id="file-upload">
                    
                    <label for="file-upload" class="btn-secondary p-3.5 cursor-pointer flex-shrink-0" title="Unggah File">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                        </svg>
                    </label>
                    
                    <button type="submit" class="btn-primary p-3.5 flex-shrink-0" title="Kirim Pesan">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </main>
    <script>
        const chat = document.getElementById("chat");
        const form = document.getElementById("form");
        const textarea = form.querySelector("textarea");
        const fileInput = document.getElementById("file-upload");
        const filePreview = document.getElementById("file-preview");
        const previewContent = document.getElementById("preview-content");
        const removeFileBtn = document.getElementById("remove-file");
        
        let selectedFile = null;
        let isTyping = false;

        function autoResize(el) {
            el.style.height = 'auto';
            const maxHeight = 120;
            const newHeight = Math.min(el.scrollHeight, maxHeight);
            el.style.height = newHeight + 'px';
            el.style.overflowY = newHeight === maxHeight ? 'auto' : 'hidden';
        }

        function getFileIcon(fileType) {
            const icons = {
                'image': `<svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>`,
                'video': `<svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>`,
                'audio': `<svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" /></svg>`,
                'pdf': `<svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>`
            };
            const type = fileType === 'application/pdf' ? 'pdf' : fileType.split('/')[0];
            return icons[type] || icons.audio;
        }

        function showTypingIndicator() {
            if (isTyping) return;
            isTyping = true;
            
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'flex justify-start mb-4 message-enter';
            typingDiv.innerHTML = `
                <div class="bot-bubble p-4 max-w-xs shadow-md">
                    <div class="flex items-center space-x-2">
                        <div class="flex space-x-1.5">
                            <div class="w-2.5 h-2.5 bg-cyan-600 rounded-full typing-dot"></div>
                            <div class="w-2.5 h-2.5 bg-cyan-ai-primary rounded-full typing-dot"></div>
                            <div class="w-2.5 h-2.5 bg-cyan-600 rounded-full typing-dot"></div>
                        </div>
                    </div>
                </div>`;
            
            chat.appendChild(typingDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
            isTyping = false;
        }

        function showFilePreview(file) {
            selectedFile = file;
            const fileType = file.type;
            previewContent.innerHTML = '';
            
            if (fileType.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.className = 'h-16 w-16 object-cover border border-cyan-500 rounded-lg';
                img.onload = () => URL.revokeObjectURL(img.src);
                
                const fileInfo = document.createElement('div');
                fileInfo.innerHTML = `<div class="text-sm font-semibold text-cyan-100">${file.name}</div><div class="text-xs text-cyan-ai-primary font-bold bg-cyan-950 px-2 py-0.5 rounded-md inline-block mt-1">${(file.size / 1024).toFixed(1)} KB</div>`;
                
                previewContent.appendChild(img);
                previewContent.appendChild(fileInfo);
            } else if (fileType === 'video/mp4') {
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                video.className = 'h-16 w-24 object-cover border border-cyan-500 rounded-lg';
                video.muted = true;
                video.onloadeddata = () => URL.revokeObjectURL(video.src);
                
                const fileInfo = document.createElement('div');
                fileInfo.innerHTML = `<div class="text-sm font-semibold text-cyan-100">${file.name}</div><div class="text-xs text-cyan-ai-primary font-bold bg-cyan-950 px-2 py-0.5 rounded-md inline-block mt-1">${(file.size / 1024 / 1024).toFixed(1)} MB</div>`;
                
                previewContent.appendChild(video);
                previewContent.appendChild(fileInfo);
            } else {
                const fileContainer = document.createElement('div');
                fileContainer.className = 'flex items-center space-x-3';
                
                const iconDiv = document.createElement('div');
                iconDiv.className = 'flex-shrink-0 p-2.5 bg-cyan-950/70 rounded-lg';
                iconDiv.innerHTML = getFileIcon(fileType);
                
                const fileTypeName = fileType === 'application/pdf' ? 'File PDF' : 'File Audio';
                const fileTypeColor = fileType === 'application/pdf' ? 'text-red-300' : 'text-green-300';

                const fileInfo = document.createElement('div');
                fileInfo.innerHTML = `<div class="text-sm font-semibold text-cyan-100">${file.name}</div><div class="text-xs text-cyan-ai-primary font-bold bg-cyan-950 px-2 py-0.5 rounded-md inline-block mt-1">${(file.size / 1024 / 1024).toFixed(1)} MB</div><div class="text-xs ${fileTypeColor} mt-1">${fileTypeName}</div>`;
                
                fileContainer.appendChild(iconDiv);
                fileContainer.appendChild(fileInfo);
                previewContent.appendChild(fileContainer);
            }
            
            filePreview.classList.remove('hidden');
        }

        function removeFilePreview() {
            selectedFile = null;
            fileInput.value = '';
            filePreview.classList.add('hidden');
            previewContent.innerHTML = '';
        }

        function createMediaElement(file, fileUrl) {
            const fileType = file.type;
            
            if (fileType.startsWith('image/')) {
                return `<img src="${fileUrl}" alt="Gambar" class="max-w-xs border border-cyan-500 rounded-xl cursor-pointer hover:opacity-90 transition-opacity duration-200" onclick="window.open('${fileUrl}', '_blank')">`;
            } else if (fileType === 'video/mp4') {
                return `<video src="${fileUrl}" controls class="max-w-xs border border-cyan-500 rounded-xl shadow-md"></video>`;
            } else if (fileType.startsWith('audio/')) {
                return `<div class="border border-cyan-500 rounded-xl p-4 max-w-xs bg-cyan-ai-bubble-bot"><div class="flex items-center space-x-2.5 mb-2.5"><div class="text-cyan-400 p-2 rounded-lg bg-cyan-950">${getFileIcon(fileType)}</div><div><div class="text-sm font-semibold text-cyan-100">${file.name}</div><div class="text-xs text-cyan-400">Audio File</div></div></div><audio src="${fileUrl}" controls class="w-full">Browser Anda tidak mendukung audio.</audio></div>`;
            } else if (fileType === 'application/pdf') {
                return `<div class="border border-cyan-500 rounded-xl p-4 max-w-md bg-cyan-ai-bubble-bot shadow-lg"><div class="flex items-center justify-between mb-3"><div class="flex items-center space-x-2.5"><div class="text-cyan-400 p-2 rounded-lg bg-cyan-950">${getFileIcon(fileType)}</div><div><div class="text-sm font-semibold text-cyan-100">${file.name}</div><div class="text-xs text-cyan-400">PDF Document</div></div></div><button onclick="window.open('${fileUrl}', '_blank')" class="bg-cyan-700 hover:bg-cyan-600 text-white px-4 py-1.5 text-xs font-semibold rounded-lg flex items-center space-x-1.5 transition"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg><span>Buka</span></button></div><iframe src="${fileUrl}" class="w-full h-40 border border-cyan-500 rounded-lg bg-white" title="${file.name}"></iframe></div>`;
            }
            return '';
        }

        function processTextFormatting(text) {
            text = text.replace(/\*\*(.*?)\*\*/g, '<span class="font-bold text-lg text-white">$1</span>');
            text = text.replace(/\*(.*?)\*/g, '<span class="font-bold text-cyan-100">$1</span>');
            return text;
        }

        function processHighlightedText(message) {
            const highlightRegex = /`(.*?)`/g;
            return message.replace(highlightRegex, '<span class="highlighted-text">$1</span>');
        }

        function processCodeBlocks(message) {
            const codeBlockRegex = /```(\w+)?\s*([\s\S]*?)```/g;
            const codeBlocks = [];
            let match;
            let lastIndex = 0;
            let result = '';
            
            while ((match = codeBlockRegex.exec(message)) !== null) {
                result += message.substring(lastIndex, match.index);
                
                const language = match[1] || 'text';
                const code = match[2].trim();
                const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
                
                codeBlocks.push({
                    id: codeId,
                    code: code,
                    language: language.toLowerCase()
                });
                
                result += `\u0001CODE_BLOCK_${codeBlocks.length - 1}\u0001`;
                
                lastIndex = codeBlockRegex.lastIndex;
            }
            
            result += message.substring(lastIndex);
            
            result = result.replace(/\n/g, "<br>");
            
            codeBlocks.forEach((block, index) => {
                const placeholder = `\u0001CODE_BLOCK_${index}\u0001`;
                const escapedCode = block.code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                
                const codeHtml = `
                <div class="code-block message-enter shadow-inner">
                    <div class="code-header">
                        <span class="code-language">${block.language}</span>
                        <button class="copy-btn" data-code-id="${block.id}" data-original-code="${block.code.replace(/"/g, '&quot;')}">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>
                            <span>Salin</span>
                        </button>
                    </div>
                    <pre class="code-content" id="${block.id}">${escapedCode}</pre>
                </div>`;
                
                result = result.replace(placeholder, codeHtml);
            });
            
            return result;
        }

        function handleCopyButtonClick(e) {
            const button = e.target.closest('.copy-btn');
            if (!button) return;
            
            const originalCode = button.getAttribute('data-original-code');
            
            if (originalCode) {
                const codeToCopy = originalCode
                    .replace(/&quot;/g, '"')
                    .replace(/&lt;/g, '<')
                    .replace(/&gt;/g, '>')
                    .replace(/&amp;/g, '&');
                
                navigator.clipboard.writeText(codeToCopy)
                    .then(() => {
                        const originalContent = button.innerHTML;
                        button.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg><span>Disalin!</span>';
                        button.classList.add('copied');
                        
                        setTimeout(() => {
                            button.innerHTML = originalContent;
                            button.classList.remove('copied');
                        }, 2000);
                    })
                    .catch(err => {
                        console.error('Gagal menyalin: ', err);
                        button.innerHTML = '<span>❌</span><span>Gagal</span>';
                        setTimeout(() => { button.innerHTML = originalContent; }, 2000);
                    });
            }
        }

        document.addEventListener('click', handleCopyButtonClick);

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) showFilePreview(file);
        });

        removeFileBtn.addEventListener('click', removeFilePreview);
        textarea.focus();

        form.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const userText = formData.get("text");

            if (userText.trim() === '' && !selectedFile) {
                textarea.focus();
                return;
            }

            let userMessageContent = '';
            let fileUrl = '';
            
            if (selectedFile) {
                fileUrl = URL.createObjectURL(selectedFile);
                userMessageContent += createMediaElement(selectedFile, fileUrl);
                formData.set("file", selectedFile);
            }
            
            if (userText.trim() !== '') {
                if (userMessageContent) userMessageContent += '<br>';
                userMessageContent += processTextFormatting(userText);
            }

            const userMessageDiv = document.createElement('div');
            userMessageDiv.className = 'flex justify-end mb-4 message-enter';
            userMessageDiv.innerHTML = `<div class="chat-bubble user-bubble shadow-md">${userMessageContent}</div>`;
            
            chat.appendChild(userMessageDiv);
            
            const submitBtn = form.querySelector("button[type='submit']");
            submitBtn.disabled = true;
            textarea.disabled = true;
            
            removeFilePreview();
            form.reset();
            textarea.style.height = 'auto';
            
            showTypingIndicator();
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch("/chat", { method: "POST", body: formData });
                const data = await res.json();

                hideTypingIndicator();

                const responseDiv = document.createElement('div');
                responseDiv.className = 'flex justify-start mb-4 message-enter';

                if (data.result) {
                    let processedResponse = processCodeBlocks(data.result);
                    processedResponse = processHighlightedText(processedResponse);
                    processedResponse = processTextFormatting(processedResponse);
                    
                    responseDiv.innerHTML = `<div class="chat-bubble bot-bubble shadow-lg"><div class="flex items-center mb-2.5 pb-1.5 border-b border-cyan-800"><div class="w-3 h-3 bg-cyan-ai-primary rounded-full mr-2.5 animate-pulse"></div><span class="text-sm text-cyan-200 font-semibold font-heading">Myana Kyu Tyawu AI</span></div><div>${processedResponse}</div></div>`;
                } else {
                    responseDiv.innerHTML = `<div class="rounded-xl border border-red-500 bg-red-950 p-4 max-w-md shadow-lg"><div class="flex items-center mb-2"><div class="w-3 h-3 bg-red-500 rounded-full mr-2.5"></div><span class="text-sm text-red-300 font-semibold font-heading">Error</span></div><div class="text-red-100">${data.error}</div></div>`;
                }

                chat.appendChild(responseDiv);

            } catch (error) {
                hideTypingIndicator();
                
                const errorDiv = document.createElement('div');
                errorDiv.className = 'flex justify-start mb-4 message-enter';
                errorDiv.innerHTML = `<div class="rounded-xl border border-red-500 bg-red-950 p-4 max-w-md shadow-lg"><div class="flex items-center mb-2"><div class="w-3 h-3 bg-red-500 rounded-full mr-2.5"></div><span class="text-sm text-red-300 font-semibold font-heading">Network Error</span></div><div class="text-red-100">Gagal mengirim pesan. Periksa koneksi internet Anda.</div></div>`;
                
                chat.appendChild(errorDiv);
            }

            submitBtn.disabled = false;
            textarea.disabled = false;
            textarea.focus();
            chat.scrollTop = chat.scrollHeight;
            
            if (fileUrl) {
                setTimeout(() => URL.revokeObjectURL(fileUrl), 1000);
            }
        };

        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
